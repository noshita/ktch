name: Lint
on:
  push:
    branches: ["main"]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
      # Only ruff is needed; the lint group keeps this far lighter than a full sync.
      - name: Sync lint tools
        run: uv sync --only-group lint
      # pre-commit is just the orchestrator, so run it with uvx;
      # the ruff it dispatches to comes from uv.lock above.
      - name: Run ruff via pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure
