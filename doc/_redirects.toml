# Redirect map for documentation URLs that earlier layouts published.
#
# Keys are site-root-relative paths that used to resolve and now return 404.
# Values are Sphinx docnames in the current layout. Docnames are stored without
# a file extension on purpose: scripts/gen_redirects.py resolves each one
# against the tree that was actually built, so the same map works whether the
# site is produced with the `html` or the `dirhtml` builder, and no entry has to
# be rewritten if the builder changes.
#
# The build fails when a target docname is missing from the built site, or when
# a source path would overwrite a real page. Renaming or removing a documented
# page therefore requires updating this file in the same change, which is what
# stops a URL layout change from shipping unnoticed.
#
# Source paths were recovered from public web archives and each was confirmed to
# return 404 before being listed. `/index.html` is deliberately absent: the site
# root already serves a redirect to the stable version.

[redirects]
