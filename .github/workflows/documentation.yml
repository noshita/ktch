name: Docs

on:
  push:
    branches: ["main"]
    paths:
      - "doc/**"
      - "ktch/**"
      - ".github/workflows/documentation.yml"
      - "pyproject.toml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  CI: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install dependencies
        run: |
          # NOTE: sphinx-multiversion from GitHub (not PyPI) is required for
          # SPHINX_MULTIVERSION_NAME environment variable support
          uv pip install --system \
            "sphinx>=8.1,<9.0" pydata-sphinx-theme \
            git+https://github.com/sphinx-contrib/multiversion.git@cd4c0db66473f04d7e037188f5f13444574b4b0e \
            sphinx-gallery sphinxcontrib-bibtex sphinxcontrib-mermaid myst-nb \
            numpydoc matplotlib seaborn 'plotly>=6.0' \
            sphinx-sitemap sphinx-favicon sphinxext-opengraph vtk opencv-python pooch
          uv pip install --system -e .

      - name: Restore notebook execution cache
        uses: actions/cache@v5
        with:
          path: doc/_build/.jupyter_cache
          key: jupyter-cache-${{ runner.os }}-${{ hashFiles('doc/**/*.md', 'ktch/**/*.py') }}
          restore-keys: |
            jupyter-cache-${{ runner.os }}-

      - name: Build multi-version docs
        run: |
          # Build all versions with sphinx-multiversion
          # -j auto enables parallel build (auto-detects CPU cores)
          sphinx-multiversion doc doc/_build/html -j auto

          # Rename main -> dev
          if [ -d "doc/_build/html/main" ]; then
            mv doc/_build/html/main doc/_build/html/dev
          fi

          # Rename v* directories to remove 'v' prefix (e.g., v0.6.1 -> 0.6.1)
          # This follows NumPy/scikit-learn conventions
          for dir in doc/_build/html/v[0-9]*; do
            if [ -d "$dir" ]; then
              version_num=$(basename "$dir" | sed 's/^v//')
              echo "Renaming $dir -> doc/_build/html/$version_num"
              mv "$dir" "doc/_build/html/$version_num"
            fi
          done

          # Get stable version number from versions.json (the preferred entry's version)
          STABLE_VERSION=$(python3 -c "
          import json
          with open('doc/_static/versions.json') as f:
              versions = json.load(f)
          # Find version with 'preferred: true' and get its version number
          for v in versions:
              if v.get('preferred') and v.get('version') != 'dev':
                  print(v['version'])  # e.g., '0.7.0'
                  break
          else:
              # Fallback: first non-dev version
              for v in versions:
                  if v.get('version') != 'dev':
                      print(v['version'])
                      break
          ")
          echo "Stable version: $STABLE_VERSION"

          # Create /stable/ directory as a copy of the versioned directory
          # This allows URLs like /stable/api/index.html to work directly
          #
          # Safety net: if versions.json references a version whose tag
          # does not yet exist, sphinx-multiversion won't build that
          # directory. Fall back to the latest available versioned
          # directory so /stable/ always serves valid content.
          SOURCE_DIR="doc/_build/html/${STABLE_VERSION}"
          ACTUAL_STABLE="${STABLE_VERSION}"
          if [ ! -d "$SOURCE_DIR" ]; then
            echo "Warning: $SOURCE_DIR not found (tag v${STABLE_VERSION} may not exist yet)"
            # Find the latest versioned directory (highest semver, excluding dev)
            ACTUAL_STABLE=$(ls -d doc/_build/html/[0-9]* 2>/dev/null \
              | xargs -I{} basename {} \
              | sort -t. -k1,1n -k2,2n -k3,3n \
              | tail -1)
            if [ -n "$ACTUAL_STABLE" ]; then
              SOURCE_DIR="doc/_build/html/${ACTUAL_STABLE}"
              echo "Falling back to latest available version: ${ACTUAL_STABLE}"
            else
              echo "Error: no versioned directory found"
              ls -la doc/_build/html/
              exit 1
            fi
          fi

          echo "Creating /stable/ directory as copy of ${ACTUAL_STABLE}"
          cp -r "$SOURCE_DIR" doc/_build/html/stable

          # Fix canonical URLs and sitemap in stable to use /stable/ instead of versioned path
          echo "Fixing URLs in /stable/ (${ACTUAL_STABLE} -> stable)"
          find doc/_build/html/stable -name "*.html" -exec \
            sed -i "s|https://doc.ktch.dev/${ACTUAL_STABLE}/|https://doc.ktch.dev/stable/|g" {} +
          if [ -f "doc/_build/html/stable/sitemap.xml" ]; then
            sed -i "s|https://doc.ktch.dev/${ACTUAL_STABLE}/|https://doc.ktch.dev/stable/|g" doc/_build/html/stable/sitemap.xml
          fi

          # Copy robots.txt to site root (html_extra_path places it inside each
          # version subdirectory, but Google expects it at the domain root)
          cp doc/_build/html/stable/robots.txt doc/_build/html/robots.txt

          # Create root index.html (redirect to /stable/)
          cat > doc/_build/html/index.html << EOF
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=stable/">
              <link rel="canonical" href="https://doc.ktch.dev/stable/">
              <title>Redirecting to stable documentation</title>
            </head>
            <body>
              <p>Redirecting to <a href="stable/">stable documentation</a>...</p>
            </body>
          </html>
          EOF

          # Create .nojekyll for GitHub Pages
          touch doc/_build/html/.nojekyll

          # Create CNAME for custom domain
          echo "doc.ktch.dev" > doc/_build/html/CNAME

          # List built versions
          echo "Built versions:"
          ls -la doc/_build/html/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: doc/_build/html

      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
